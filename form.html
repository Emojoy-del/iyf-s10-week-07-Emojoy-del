<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Save Contact Form</title>
  <link rel="stylesheet" href="form.css">
</head>
<body>
  <div class="container">
    <h1>Contact Us</h1>
    <div class="info">
      <p>This form automatically saves your progress to localStorage. Your data is never sent to a server - it stays in your browser!</p>
    </div>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>

      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company">
      </div>

      <div class="form-group">
        <label for="subject">Subject *</label>
        <select id="subject" name="subject" required>
          <option value="">Select a subject</option>
          <option value="general">General Inquiry</option>
          <option value="support">Technical Support</option>
          <option value="sales">Sales</option>
          <option value="partnership">Partnership</option>
          <option value="feedback">Feedback</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" name="message" rows="6" required placeholder="Please enter your message here..."></textarea>
      </div>

      <div class="form-group">
        <label for="priority">Priority Level</label>
        <select id="priority" name="priority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Send Message</button>
        <button type="button" id="clearFormBtn" class="btn-secondary">Clear Form</button>
      </div>
    </form>

    <div class="storage-info">
      <h3>Auto-Save Status</h3>
      <div class="storage-display" id="storageDisplay">
        <p>Loading saved data...</p>
      </div>
    </div>
  </div>

  <div class="auto-save-indicator" id="autoSaveIndicator">
    💾 Auto-saved
  </div>

  <div class="success-message" id="successMessage" style="display: none;">
    ✅ Message sent successfully!
  </div>

  <script src="form.js"></script>
</body>
</html>
