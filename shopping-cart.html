<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Shopping Cart - Mini Project</title>
  <link rel="stylesheet" href="cart.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>🛒 ShopHub Pro</h1>
      <div class="cart-icon" onclick="toggleCart()">
        <span class="cart-count" id="cartCount">0</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="m1 1 4 4h15l-1 5H6"></path>
        </svg>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Advanced Filters Section -->
    <section class="filters-section">
      <div class="filters-container">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
            oninput="app.dispatch({ type: 'SET_FILTER', payload: { search: this.value } })"
          >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>

        <div class="filter-controls">
          <select id="categoryFilter" onchange="app.dispatch({ type: 'SET_FILTER', payload: { category: this.value } })">
            <option value="all">All Categories</option>
            <option value="Laptops">Laptops</option>
            <option value="Smartphones">Smartphones</option>
            <option value="Audio">Audio</option>
            <option value="Tablets">Tablets</option>
          </select>

          <select id="sortFilter" onchange="app.dispatch({ type: 'SET_FILTER', payload: { sortBy: this.value } })">
            <option value="name">Sort by Name</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="rating">Highest Rated</option>
          </select>
        </div>
      </div>
    </section>

    <section class="products-section">
      <div class="products-header">
        <h2>Featured Products</h2>
        <div class="products-stats">
          <span id="productsCount">0</span> products found
        </div>
      </div>
      <div class="products-grid" id="productsGrid">
        <!-- Products will be rendered here -->
      </div>
    </section>

    <!-- Advanced Cart Sidebar -->
    <section class="cart-section" id="cartSection">
      <div class="cart-header">
        <h2>Shopping Cart</h2>
        <button class="close-cart" onclick="toggleCart()">×</button>
      </div>

      <div class="cart-content">
        <div class="cart-items" id="cartItems">
          <p class="empty-cart">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="m1 1 4 4h15l-1 5H6"></path>
            </svg>
            <br>
            Your cart is empty
            <br>
            <small>Add some products to get started!</small>
          </p>
        </div>

        <div class="cart-summary" id="cartSummary" style="display: none;">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="cartSubtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping:</span>
            <span id="cartShipping">Free</span>
          </div>
          <div class="summary-row">
            <span>Tax:</span>
            <span id="cartTax">$0.00</span>
          </div>
          <hr>
          <div class="summary-row total">
            <strong>Total:</strong>
            <strong id="cartTotal">$0.00</strong>
          </div>
        </div>
      </div>

      <div class="cart-footer" id="cartFooter" style="display: none;">
        <div class="cart-actions">
          <button class="btn-secondary" onclick="clearCart()">Clear Cart</button>
          <button class="btn-primary" onclick="checkout()">Checkout</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Enhanced Success Message -->
  <div class="success-message" id="successMessage" style="display: none;">
    <div class="success-content">
      <div class="success-icon">✅</div>
      <h3>Added to Cart!</h3>
      <p id="successText">Item has been added to your cart</p>
      <div class="success-actions">
        <button onclick="hideSuccessMessage()">Continue Shopping</button>
        <button onclick="toggleCart(); hideSuccessMessage();" class="btn-primary">View Cart</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display: none;">
    <div class="loading-content">
      <div class="loading"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script src="cart.js"></script>
</body>
</html>
